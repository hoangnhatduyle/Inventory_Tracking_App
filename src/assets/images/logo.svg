<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="512" height="512" fill="white"/>
  
  <!-- Pink heart centered -->
  <g transform="translate(256, 256)">
    <!-- Heart shape -->
    <path d="M 0,-80 
             C -20,-100 -50,-100 -70,-80
             C -90,-60 -90,-30 -70,-10
             L 0,60
             L 70,-10
             C 90,-30 90,-60 70,-80
             C 50,-100 20,-100 0,-80 Z" 
          fill="#F8A5C2" 
          stroke="#E57A9B" 
          stroke-width="8"/>
    
    <!-- Left eye -->
    <ellipse cx="-35" cy="-30" rx="18" ry="28" fill="black"/>
    
    <!-- Right eye -->
    <ellipse cx="35" cy="-30" rx="18" ry="28" fill="black"/>
  </g>
</svg>
