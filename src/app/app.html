<div class="app-container">
  <mat-toolbar color="primary" class="app-toolbar" *ngIf="isAuthenticated">
    <button mat-icon-button (click)="drawer.toggle()">
      <mat-icon>menu</mat-icon>
    </button>
    <img src="images/image.png" alt="App Logo" class="app-logo">
    <span class="app-title">{{ title }}</span>
    <span class="spacer"></span>
    <button mat-icon-button (click)="logout()">
      <mat-icon>logout</mat-icon>
    </button>
  </mat-toolbar>

  <mat-drawer-container class="drawer-container" *ngIf="isAuthenticated">
    <mat-drawer #drawer mode="side" opened class="app-sidenav" class="padding-horizontal">
      <mat-nav-list>
        <a mat-list-item routerLink="/dashboard" routerLinkActive="active">
          <mat-icon matListItemIcon>dashboard</mat-icon>
          <span matListItemTitle>Dashboard</span>
        </a>
        <a mat-list-item routerLink="/inventory" routerLinkActive="active">
          <mat-icon matListItemIcon>inventory_2</mat-icon>
          <span matListItemTitle>Inventory</span>
        </a>
        <a mat-list-item routerLink="/shopping-list" routerLinkActive="active">
          <mat-icon matListItemIcon>shopping_cart</mat-icon>
          <span matListItemTitle>Shopping List</span>
        </a>
        <a mat-list-item routerLink="/waste-tracking" routerLinkActive="active">
          <mat-icon matListItemIcon>delete_sweep</mat-icon>
          <span matListItemTitle>Waste Tracking</span>
        </a>
        <a mat-list-item routerLink="/settings" routerLinkActive="active">
          <mat-icon matListItemIcon>settings</mat-icon>
          <span matListItemTitle>Settings</span>
        </a>
      </mat-nav-list>
    </mat-drawer>

    <mat-drawer-content class="main-content">
      <div class="page-transition">
        <router-outlet></router-outlet>
      </div>
    </mat-drawer-content>
  </mat-drawer-container>

  <div class="login-container" *ngIf="!isAuthenticated">
    <router-outlet></router-outlet>
  </div>
</div>
